<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DORMEDS - Medicine Delivery & Pharmacy Management Platform" />
  <title>DORMEDS - Medicine Delivery Platform</title>

  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Outfit:wght@500;600;700;800&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons+Round" rel="stylesheet">

  <!-- All CSS inlined via link tags (works with file://) -->
  <link rel="stylesheet" href="components.css">
  <style>
    /* Additional layout styles for the app shell */
    .app-main {
      flex: 1;
      margin-left: var(--sidebar-width);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      transition: margin-left var(--transition-base);
    }
    .app-main.sidebar-collapsed {
      margin-left: var(--sidebar-collapsed);
    }
    .app-content {
      flex: 1;
      padding: var(--space-8);
      margin-top: var(--header-height);
    }
    .slide-up {
      animation: fadeInUp 0.4s ease;
    }
    @media (max-width: 1024px) {
      .app-main, .app-main.sidebar-collapsed {
        margin-left: 0;
      }
      .app-content {
        padding: var(--space-4);
      }
    }
  </style>
</head>
<body>
  <div id="app-root">
    <div style="display:flex;align-items:center;justify-content:center;min-height:100vh">
      <div class="loader"><div class="loader-pill"></div><p>Loading DORMEDS...</p></div>
    </div>
  </div>
  <div id="toast-container"></div>
  <div id="modal-root"></div>

  <!-- ========== ALL JS BUNDLED AS REGULAR SCRIPTS (no ES modules) ========== -->

  <!-- 1. Store (state management) -->
  <script src="js/store.js"></script>

  <!-- 2. Utilities -->
 <script src="router.js"></script>

<script src="sidebar.js"></script>
<script src="header.js"></script>

<script src="login.js"></script>
<script src="dashboard.js"></script>
<script src="orders.js"></script>
<script src="inventory.js"></script>
<script src="pharmacies.js"></script>
<script src="documents.js"></script>
<script src="billing.js"></script>
<script src="returns.js"></script>
<script src="subscriptions.js"></script>
<script src="support.js"></script>
<script src="settings.js"></script>

<script src="app.js"></script>
</body>
</html>
